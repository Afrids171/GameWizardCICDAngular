<div class="order-page">

    <div class="order-card">

        <h1 class="order-title">🎮 Place Your Order</h1>
        <p class="order-subtitle">Complete your purchase at Game Wizard</p>

        <form>

            

          

            <div class="form-group">
                <label>Total Amount</label>
                <input type="text" value={{CartTotal}} readonly>
            </div>


            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" placeholder="Enter Shipping Address" [formControl]="Address" name="Address">
            </div>

            <button type="submit" class="order-btn" (click)="onConfirmOrder()">Confirm Order</button>

        </form>

    </div>

</div>
